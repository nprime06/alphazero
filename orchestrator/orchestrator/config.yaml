# AlphaZero Pipeline Configuration
#
# Each coordinator run is self-contained in its own run directory.
# Data, weights, checkpoints, and tensorboard logs are stored there.
#
# Usage:
#   ./training/scripts/submit_coordinator.sh --config orchestrator/orchestrator/config.yaml
#   ./training/scripts/submit_coordinator.sh --config orchestrator/orchestrator/config.yaml --network tiny --iterations 5

project_dir: /home/willzhao/alphazero

# Self-play
# Number of games generated per iteration of the pipeline.
selfplay_games_per_iteration: 250
# MCTS simulations per move during self-play.
selfplay_simulations: 400
# Max moves per game (caps pointless long draws from weak models).
selfplay_max_moves: 300
# Number of games played concurrently (main throughput lever).
# Each game sends NN requests to a shared InferenceServer which batches
# them for the GPU. More parallel games = better GPU utilization.
# Tune based on model size: tiny=16-32, small=8-16, medium=4-8, full=2-4.
selfplay_parallel_games: 16
# CPU threads per game (for within-game MCTS parallelism).
# With parallel_games > 1, keep this at 1 unless you have many CPUs.
# Total MCTS workers = parallel_games * threads.
selfplay_threads: 1
# Neural network inference batch size.  Set to 0 (default) to auto-calculate
# as parallel_games * threads so the inference server fires batches immediately
# instead of waiting for a timeout.  Only set manually to override.
# selfplay_batch_size: 0
# Export models in FP16 for ~2x faster GPU inference via Tensor Cores.
# Disable for CPU-only inference (FP16 is slower on CPU).
selfplay_fp16: true

# Training
# Gradient steps per iteration (not total steps).
train_steps_per_iteration: 500
# Mini-batch size.
train_batch_size: 256
# Network architecture: tiny, small, medium, or full.
train_network: full
# Number of GPUs for training.
train_gpus: 1

# Evaluation
# Number of games to play when comparing models.
eval_games: 40
# MCTS simulations per move during evaluation.
eval_simulations: 400
# Win rate threshold for the new model to replace the current best.
# 0.55 means the new model must win at least 55% of evaluation games.
eval_win_threshold: 0.55

# Pipeline
# Maximum number of iterations (0 = run indefinitely).
max_iterations: 0
# Minimum games in replay buffer before the first training run.
min_games_before_training: 50
# Number of weight file versions to keep on disk.
weights_keep_n: 10

# Slurm (for cluster deployment)
slurm_partition: mit_normal_gpu
slurm_time_selfplay: "6:00:00"
slurm_time_train: "6:00:00"
